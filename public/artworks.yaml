- title: Intérieur d'une église à Utrecht
  artist: Pieter Jansz Saenredam
  year: 1644
  image: /images/saenredam_1644.jpg
  tags:
    - neerlandais
  rating: 2.5
  notes: |
    Moment de la Réforme protestante, aux Pays-Bas, on prône la simplicité et la sobriété dans les églises, pour se connecter à Dieu sans distraction.
    A contraster avec Bernini et ses effets décoratifs grandioses, très chargées et décorées, pour impressionner les fidèles et les rapprocher de Dieu par la beauté et la grandeur.

