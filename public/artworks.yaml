- title: Bonjour Monsieur Courbet
  artist: Gustave Courbet
  year: 1854
  image: /images/courbet_1854.jpg
  tags:
    - realisme
  rating: 3
  notes: |
    Courbet est considéré comme le père du réalisme, avec son refus de l'idéalisation
    et de la stylisation, pour représenter la réalité telle qu'elle est, sans
    fard ni embellissement. Il se tourne vers les sujets de la vie quotidienne,
    les gens du peuple, les paysages, les scènes de genre, pour les représenter
    avec dignité et réalisme. C'est une vraie rupture avec l'académisme et ses
    sujets mythologiques et historiques.

