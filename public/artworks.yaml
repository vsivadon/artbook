- title: Le Jugement de Salomon
  artist: Nicolas Poussin
  year: 1649
  image: /images/poussin_1649.jpg
  tags:
    - classicisme
  rating: 1.5
  notes: |
    Poussin est considéré comme le père du classicisme. Il a donné son nom au
    mouvement dit poussiniste, qui prône la supériorité du dessin et de la
    composition sur la couleur, en opposition au rubénisme. Le milieu du XVIIe
    siècle est marqué par une quête de légitimité du statut de peintre. Pour se
    faire, ils se rapprochent spirituellement de la poésie, elle respectée
    depuis les grecques, et donc veulent s'intellectualiser (création de
    l'Academie en 1648, Academie étant le nom de l'école de Platon). Ils y
    apprennent l'anatomie, la perspective, se rapprochent en ça des sciences.

